<!DOCTYPE html>
<html>
<head>
    <title>Appointment Booking App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h2>User Registration</h2>

        <form id="userForm">

            <input
                type="text"
                id="name"
                placeholder="Enter Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="text"
                id="phone"
                placeholder="Enter Phone"
                required
            >

            <button type="submit">
                Add User
            </button>

        </form>

        <h2>All Users</h2>

        <ul id="userList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
